<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contasLGS — Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #070a13 0%, #0e1424 100%);
        }
        
        .auth-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .auth-card {
            background: rgba(14, 19, 34, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 2.25rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: var(--border-radius-md);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-error {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--color-expense);
            color: var(--color-expense);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--color-income);
            color: var(--color-income);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div class="auth-card">
            <div class="auth-header">
                <h2>Crie sua Conta</h2>
                <p>Insira seus dados essenciais para se cadastrar</p>
            </div>

            <div class="alert alert-error" id="registerAlertError" style="display: none;">
                <i class="bx bx-error-circle"></i>
                <span id="registerAlertErrorText"></span>
            </div>

            <div class="alert alert-success" id="registerAlertSuccess" style="display: none;">
                <i class="bx bx-check-circle"></i>
                <span id="registerAlertSuccessText"></span>
            </div>

            <form id="registerForm" style="display: flex; flex-direction: column; gap: 1.25rem;">
                <!-- Nome Completo -->
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="Seu nome completo" required>
                </div>

                <!-- E-mail -->
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="seu-email@exemplo.com" required>
                </div>

                <!-- Nome de Usuário -->
                <div class="form-group">
                    <label for="username">Nome de Usuário (Login)</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Escolha um usuário" required>
                </div>

                <!-- Senha -->
                <div class="form-group">
                    <label for="password">Senha de Acesso</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>

                <!-- Confirmar Senha -->
                <div class="form-group">
                    <label for="passwordConfirm">Confirmar Senha</label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm" class="form-input" placeholder="Repita a senha" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem; width: 100%;">
                    Cadastrar Minha Conta
                </button>
            </form>

            <div class="auth-footer">
                Já possui registro? <a href="login.html">Faça Login</a>
            </div>
        </div>

    </div>

    <script src="localdb.js"></script>
</body>
</html>
